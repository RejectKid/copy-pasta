name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build release packages
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore CopyPasta.csproj

      - name: Publish Windows
        run: dotnet publish CopyPasta.csproj -c Release -f net10.0-windows -r win-x64 --self-contained false -o artifacts/CopyPasta-win-x64

      - name: Publish Linux
        run: dotnet publish CopyPasta.csproj -c Release -f net10.0 -r linux-x64 --self-contained false -o artifacts/CopyPasta-linux-x64

      - name: Publish macOS Intel
        run: dotnet publish CopyPasta.csproj -c Release -f net10.0 -r osx-x64 --self-contained false -o artifacts/CopyPasta-osx-x64

      - name: Publish macOS Apple Silicon
        run: dotnet publish CopyPasta.csproj -c Release -f net10.0 -r osx-arm64 --self-contained false -o artifacts/CopyPasta-osx-arm64

      - name: Zip packages
        shell: pwsh
        run: |
          Compress-Archive -Path artifacts/CopyPasta-win-x64/* -DestinationPath CopyPasta-win-x64.zip
          Compress-Archive -Path artifacts/CopyPasta-linux-x64/* -DestinationPath CopyPasta-linux-x64.zip
          Compress-Archive -Path artifacts/CopyPasta-osx-x64/* -DestinationPath CopyPasta-osx-x64.zip
          Compress-Archive -Path artifacts/CopyPasta-osx-arm64/* -DestinationPath CopyPasta-osx-arm64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CopyPasta-win-x64.zip
            CopyPasta-linux-x64.zip
            CopyPasta-osx-x64.zip
            CopyPasta-osx-arm64.zip
          generate_release_notes: true
